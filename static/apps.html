<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <link rel="shortcut icon" id="tab-favicon" href="favicon.png" />
  <title id="t">Ghosty | Apps</title>

  <script src="./assets/mathematics/bundle.js?v=2025-04-15"></script>
  <script src="./assets/mathematics/config.js?v=2025-04-15"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/assets/css/global.css?v=ghosty" />
  <link rel="stylesheet" href="/assets/css/quantum.css?v=ghosty" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div id="webgl-container" style="position: fixed;"></div>

  <div class="page-wrapper">
    <div class="header-section">
      <div class="system-status-pill" style="margin-bottom: 16px;">
        <span class="status-dot"></span>
        Apps Directory
      </div>
      <h2 class="header-title">Applications</h2>
      <p class="header-subtitle">Access your favorite web applications</p>
    </div>

    <div class="filter-container">
      <input type="text" id="search" class="ghosty-input" onkeyup="bar()" placeholder="Search apps..." />
      <select title="Category" id="category" class="ghosty-select" name="category" onchange="category()">
        <option value="all">All Apps</option>
        <option value="android">Android</option>
        <option value="social">Social</option>
        <option value="stream">Streaming</option>
        <option value="message">Messaging</option>
        <option value="media">Media</option>
        <option value="game">Gaming</option>
        <option value="cloud">Cloud</option>
        <option value="tool">Utilities</option>
        <option value="ai">AI</option>
        <option value="emu">Emulation</option>
        <option value="mail">Email</option>
      </select>
    </div>

    <div id="apps-container">
      <div class="pinned"></div>
      <div class="apps" id="quantum-apps-grid"></div>
    </div>
  </div>

  <nav class="pro-dock">
    <div class="dock-island" id="dock">
      <a href="/" class="dock-btn" data-tip="Home">
        <i class="fa-solid fa-house"></i>
      </a>
      <a href="/a" class="dock-btn" data-tip="Games">
        <i class="fa-solid fa-gamepad"></i>
      </a>
      <a href="/b" class="dock-btn active" data-tip="Apps">
        <i class="fa-solid fa-table-cells-large"></i>
      </a>
      <a href="/c" class="dock-btn" data-tip="Settings">
        <i class="fa-solid fa-sliders"></i>
      </a>
      <a href="/d" class="dock-btn" data-tip="Browser">
        <i class="fa-solid fa-folder-tree"></i>
      </a>
    </div>
  </nav>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <script src="/assets/js/3d-engine.js"></script>
  <script src="/assets/js/index-3.js"></script>
  <script src="/assets/js/c1.js"></script>
  <script src="/assets/js/m1.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const applyHoverEffect = (card) => {
        if (card.dataset.hoverBound) return;
        card.dataset.hoverBound = "true";
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
          card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
        });
      };

      const observer = new MutationObserver(() => {
        document.querySelectorAll('.column').forEach(applyHoverEffect);
      });

      const grid = document.getElementById('quantum-apps-grid');
      if (grid) observer.observe(grid, { childList: true, subtree: true });
    });
  </script>
</body>

</html>
