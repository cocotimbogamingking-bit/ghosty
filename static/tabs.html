<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" id="tab-favicon" href="favicon.png" />
  <title id="t">Home</title>
  <link rel="stylesheet" href="/assets/css/global.css?v=6" />
  <link rel="stylesheet" href="/assets/css/t.css?v=02" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body id="no">
  <div class="glow-wrapper">
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
  </div>

  <div class="tabs-app-container">
    <nav class="tabs-header" id="right-side-nav">
      <ul id="tab-list"></ul>
      <button title="New Tab" id="add-tab" class="add-tab-btn">
        <i class="fa-solid fa-plus"></i>
      </button>
    </nav>

    <div class="nav-bar">
      <div class="nav-container">
        <div class="nav-controls">
          <button title="Home" id="home-page" class="nav-icon-btn">
            <i class="fa-solid fa-house"></i>
          </button>
          <div class="nav-arrows">
            <button title="Back" class="nav-icon-btn" onclick="goBack()">
              <i class="fa-solid fa-arrow-left"></i>
            </button>
            <button title="Forward" class="nav-icon-btn" onclick="goForward()">
              <i class="fa-solid fa-arrow-right"></i>
            </button>
            <button title="Reload" onclick="reload()" class="nav-icon-btn">
              <i class="fa-solid fa-rotate-right"></i>
            </button>
          </div>
        </div>

        <div class="url-bar-wrapper">
          <form id="fv" class="url-form" method="POST">
            <i class="fa-solid fa-lock url-status-icon"></i>
            <input id="input" class="url-input" placeholder="Search or enter URL..." type="text" autocomplete="off" />
          </form>
        </div>

        <div class="nav-actions-right">
          <button title="Inspect" class="nav-icon-btn" onclick="eToggle()">
            <i class="fa-solid fa-code"></i>
          </button>
          <button title="Popout" id="popout-button" class="nav-icon-btn" onclick="popout()">
            <i class="fa-solid fa-up-right-from-square"></i>
          </button>
          <button title="Fullscreen" id="fullscreen-button" class="nav-icon-btn">
            <i class="fa-solid fa-expand"></i>
          </button>
          <button title="Toggle Tabs" id="tabs-button" class="nav-icon-btn">
            <i class="fa-solid fa-sidebar"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="frame-container" id="frame-container"></div>
  </div>

  <script src="assets/js/t3.js"></script>
  <script src="./assets/mathematics/bundle.js?v=2025-04-15"></script>
  <script src="./assets/mathematics/config.js?v=2025-04-15"></script>
  <script src="/assets/js/m1.js"></script>
</body>

</html>
