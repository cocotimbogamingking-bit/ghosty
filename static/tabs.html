<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" id="tab-favicon" href="favicon.png" />
  <title id="t">Ghosty | Browser</title>

  <link rel="stylesheet" href="/assets/css/global.css?v=ghosty" />
  <link rel="stylesheet" href="/assets/css/quantum.css?v=ghosty" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --chrome-height: 90px;
      --tab-height: 38px;
    }

    body#no {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--bg-primary);
      height: 100vh;
      width: 100vw;
    }
  </style>
  <script>
    window.addEventListener("resize", navigator.keyboard.lock(["Escape"]));
  </script>
</head>

<body id="no">
  <!-- Browser Chrome -->
  <header class="browser-chrome">
    <nav class="nav">
      <ul id="tab-list"></ul>
      <button title="New Tab" id="add-tab">
        <i class="fa-solid fa-plus"></i>
      </button>
    </nav>
    <div class="nav-bar">
      <div class="nav-container">
        <div class="nav-left">
          <button title="Home" class="nav-button" onclick="Home()">
            <i class="fa-solid fa-house"></i>
          </button>
          <button title="Back" class="nav-button" onclick="goBack()">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button title="Forward" class="nav-button" onclick="goForward()">
            <i class="fa-solid fa-arrow-right"></i>
          </button>
          <button title="Reload" onclick="reload()" class="nav-button">
            <i class="fa-solid fa-rotate-right"></i>
          </button>
        </div>

        <form id="fv" class="navpost" method="POST">
          <input id="input" class="bar" placeholder="Search or enter URL..." type="text" autocomplete="off"
            spellcheck="false" />
        </form>

        <div class="nav-right">
          <button title="Fullscreen" class="nav-button" onclick="FS()">
            <i class="fa-solid fa-expand"></i>
          </button>
          <button title="Pop Out" class="nav-button" onclick="popout()">
            <i class="fa-solid fa-up-right-from-square"></i>
          </button>
          <button title="DevTools" class="nav-button" onclick="eToggle()">
            <i class="fa-solid fa-code"></i>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Content Layer -->
  <div class="frame-container" id="frame-container"></div>

  <!-- Background -->
  <div id="webgl-container" style="position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <script src="assets/js/t3.js"></script>
  <script src="/assets/js/3d-engine.js"></script>
  <script src="./assets/mathematics/bundle.js?v=2025-04-15"></script>
  <script src="./assets/mathematics/config.js?v=2025-04-15"></script>
  <script src="/assets/js/m1.js"></script>
</body>

</html>
